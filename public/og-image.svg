<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Drum icon (centered, larger) -->
  <g transform="translate(460, 80) scale(4.2)">
    <ellipse cx="32" cy="44" rx="24" ry="8" fill="#c2410c"/>
    <rect x="8" y="24" width="48" height="20" fill="#ea580c"/>
    <ellipse cx="32" cy="24" rx="24" ry="8" fill="#fb923c"/>
    <ellipse cx="32" cy="24" rx="20" ry="6" fill="#fdba74" opacity="0.5"/>
    <rect x="8" y="30" width="48" height="2" fill="#c2410c" opacity="0.4"/>
    <rect x="8" y="36" width="48" height="2" fill="#c2410c" opacity="0.4"/>
    <line x1="18" y1="8" x2="36" y2="22" stroke="#fef3c7" stroke-width="3" stroke-linecap="round"/>
    <circle cx="17" cy="7" r="2.5" fill="#fde68a"/>
    <line x1="46" y1="8" x2="28" y2="22" stroke="#fef3c7" stroke-width="3" stroke-linecap="round"/>
    <circle cx="47" cy="7" r="2.5" fill="#fde68a"/>
  </g>

  <!-- Title -->
  <text x="600" y="440" text-anchor="middle" fill="#fafafa" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" letter-spacing="-1">Pocket Drums</text>

  <!-- Subtitle -->
  <text x="600" y="500" text-anchor="middle" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="28">Tap to play. Instant response. Zero setup.</text>

  <!-- Colored pad indicators -->
  <g transform="translate(390, 550)">
    <rect x="0" y="0" width="50" height="30" rx="6" fill="#ca8a04"/>
    <rect x="70" y="0" width="50" height="30" rx="6" fill="#2563eb"/>
    <rect x="140" y="0" width="50" height="30" rx="6" fill="#16a34a"/>
    <rect x="210" y="0" width="50" height="30" rx="6" fill="#ea580c"/>
    <rect x="280" y="0" width="50" height="30" rx="6" fill="#9333ea"/>
    <rect x="350" y="0" width="50" height="30" rx="6" fill="#db2777"/>
  </g>
</svg>
